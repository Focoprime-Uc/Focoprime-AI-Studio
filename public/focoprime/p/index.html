<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FocoPrime AI Tool</title>

<link rel="stylesheet" href="../style.css">

<style>

.tool-container{
max-width:800px;
margin:auto;
padding:40px;
}

.tool-title{
font-size:28px;
font-weight:600;
margin-bottom:10px;
}

.tool-desc{
color:#777;
margin-bottom:25px;
}

.tool-input{

width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:15px;

}

.run-btn{

background:linear-gradient(135deg,#6c63ff,#2b6cff);
border:none;
color:white;

padding:12px 18px;
border-radius:10px;

cursor:pointer;
font-size:14px;

}

.response-box{

margin-top:25px;

background:#f7f7f7;

padding:20px;

border-radius:12px;

white-space:pre-wrap;

}

.tool-actions{

margin-top:15px;
display:flex;
gap:10px;

}

.action-btn{

border:none;
padding:8px 12px;

border-radius:8px;
cursor:pointer;

background:#eee;

}

</style>

</head>

<body>

<div class="tool-container">

<div class="tool-title" id="promptTitle">Loading...</div>

<div class="tool-desc">
AI tool powered by FocoPrime
</div>

<textarea
id="promptInput"
class="tool-input"
rows="6"
placeholder="Type your request..."
></textarea>

<button class="run-btn" onclick="runPrompt()">
Run AI
</button>

<div class="response-box" id="responseBox">
AI response will appear here...
</div>

<div class="tool-actions">

<button class="action-btn" onclick="copyResult()">
Copy Result
</button>

<button class="action-btn" onclick="shareTool()">
Share
</button>

</div>

</div>

<script type="module" src="prompt.js"></script>

</body>
</html>
